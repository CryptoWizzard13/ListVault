<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crypto Listing Hub</title>

<style>
body {
margin:0;
font-family:Arial;
background: radial-gradient(circle at top, #1b1b1b, #0b0b0b);
color:white;
}

.container {
max-width:1100px;
margin:auto;
padding:70px 20px;
text-align:center;
}

h1 {
font-size:44px;
margin-bottom:10px;
}

.subtitle {
opacity:0.7;
margin-bottom:40px;
}

.grid {
display:grid;
grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
gap:20px;
margin-top:40px;
}

.card {
background: rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.1);
padding:30px;
border-radius:16px;
text-decoration:none;
color:white;
transition:0.3s;
backdrop-filter: blur(12px);
}

.card:hover {
transform: translateY(-6px);
border-color: gold;
box-shadow: 0 0 25px rgba(255,215,0,0.25);
}

.btn {
display:inline-block;
margin-top:12px;
padding:10px 14px;
background:gold;
color:black;
font-weight:bold;
border-radius:8px;
}
</style>

</head>

<body>

<div class="container">

<h1>🚀 Exchange Listing Hub</h1>
<p class="subtitle">Select an exchange to view listing packages & marketing campaigns</p>

<div class="grid">

<a class="card" href="weex.html">
<h2>WEEX</h2>
<div class="btn">View Packages</div>
</a>

<a class="card" href="coinstore.html">
<h2>Coinstore</h2>
<div class="btn">View Packages</div>
</a>

<a class="card" href="btcc.html">
<h2>BTCC</h2>
<div class="btn">View Packages</div>
</a>

<a class="card" href="tothemoon.html">
<h2>Tothemoon</h2>
<div class="btn">View Packages</div>
</a>

</div>

</div>

</body>
</html>
